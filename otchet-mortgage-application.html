const KEYNAME = "pl_unlock_pw_v1";
function b64d(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
async function deriveKey(pw){
  const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name:"PBKDF2", salt:b64d(DATA.salt), iterations:DATA.iter, hash:"SHA-256" },
    base, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
}
async function decrypt(pw){
  const key = await deriveKey(pw);
  const pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b64d(DATA.iv) }, key, b64d(DATA.ct));
  return new TextDecoder().decode(pt);
}
function render(html){ document.open(); document.write(html); document.close(); }
async function tryUnlock(pw, fromCache){
  try {
    const html = await decrypt(pw);
    try { sessionStorage.setItem(KEYNAME, pw); } catch(_e) {}
    render(html);
    return true;
  } catch(_e) {
    if (!fromCache) document.getElementById("e").textContent = "Неверный пароль";
    if (fromCache) { try { sessionStorage.removeItem(KEYNAME); } catch(_e2) {} }
    return false;
  }
}
document.getElementById("f").addEventListener("submit", (ev) => {
  ev.preventDefault();
  document.getElementById("e").textContent = "";
  tryUnlock(document.getElementById("pw").value, false);
});
(function(){ try { const c = sessionStorage.getItem(KEYNAME); if (c) tryUnlock(c, true); } catch(_e) {} })();
