/* ── Встроенный чат-ассистент (правая панель, на любой странице) ─────────── */
.chatd-fab {
  position: fixed; right: 22px; bottom: 22px; z-index: 80;
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--ui-bright), #1f9c38);
  color: #06210f; border: none; cursor: pointer;
  box-shadow: 0 12px 30px -8px rgba(33,160,56,.6);
  transition: transform .15s ease, box-shadow .15s ease;
}
.chatd-fab svg { width: 24px; height: 24px; }
.chatd-fab:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 16px 38px -8px rgba(33,160,56,.7); }
.chatd-overlay {
  position: fixed; inset: 0; z-index: 90; background: rgba(0,0,0,.45);
  opacity: 0; pointer-events: none; transition: opacity .2s ease; backdrop-filter: blur(2px);
}
.chatd-overlay.open { opacity: 1; pointer-events: auto; }
.chatd-drawer {
  position: fixed; top: 0; right: 0; z-index: 95; height: 100vh;
  width: min(440px, 92vw); display: flex; flex-direction: column;
  background: var(--pl-bg-1, #0e1013); border-left: 1px solid var(--ui-line);
  box-shadow: -24px 0 60px -20px rgba(0,0,0,.6);
  transform: translateX(102%); transition: transform .26s cubic-bezier(.22,1,.36,1);
}
.chatd-drawer.open { transform: translateX(0); }
.chatd-head {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 16px 18px; border-bottom: 1px solid var(--ui-line); flex-shrink: 0;
}
.chatd-title { font-weight: 800; font-size: 15px; color: var(--ui-text); }
.chatd-sub { font-size: 11px; color: var(--ui-subtle); margin-top: 2px; }
.chatd-close {
  background: var(--ui-glass); border: 1px solid var(--ui-line); color: var(--ui-muted);
  width: 32px; height: 32px; border-radius: 9px; cursor: pointer; font-size: 14px;
}
.chatd-close:hover { color: var(--ui-text); border-color: var(--ui-line2); }
.chatd-body { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.chatd-messages { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
.chatd-msg { display: flex; }
.chatd-msg.me { justify-content: flex-end; }
.chatd-bubble {
  max-width: 86%; padding: 10px 13px; border-radius: 14px; font-size: 14px; line-height: 1.5;
  background: var(--ui-glass); border: 1px solid var(--ui-line); color: var(--ui-text);
}
.chatd-msg.me .chatd-bubble {
  background: rgba(33,160,56,.14); border-color: rgba(62,207,103,.3); color: var(--ui-text);
}
.chatd-text { white-space: pre-wrap; }
.chatd-empty { text-align: center; margin: auto; padding: 30px 16px; }
.chatd-empty-ic { font-size: 34px; margin-bottom: 10px; }
.chatd-empty-t { font-weight: 700; color: var(--ui-text); margin-bottom: 6px; }
.chatd-empty-s { font-size: 12.5px; color: var(--ui-muted); line-height: 1.5; max-width: 280px; margin: 0 auto; }
.chatd-note { padding: 10px 18px; font-size: 12px; color: var(--ui-muted); border-bottom: 1px solid var(--ui-line); }
.chatd-note-warn { color: #fcd34d; }
.chatd-composer {
  display: flex; flex-direction: column; gap: 8px; padding: 10px 14px 12px;
  border-top: 1px solid var(--ui-line); flex-shrink: 0;
}
.chatd-composer-row { display: flex; align-items: flex-end; gap: 8px; }
.chatd-toolbar { display: flex; align-items: center; gap: 8px; }
.chatd-model { display: inline-flex; align-items: center; gap: 6px; background: var(--ui-glass); border: 1px solid var(--ui-line2); border-radius: 9px; padding: 4px 8px 4px 9px; }
.chatd-model-ic { display: inline-flex; color: var(--ui-bright); }
.chatd-model-ic svg { width: 14px; height: 14px; }
.chatd-model-select { background: transparent; border: none; color: var(--ui-text); font-size: 12.5px; font-family: inherit; cursor: pointer; outline: none; max-width: 220px; }
.chatd-model-select option { background: var(--ui-bg1); color: var(--ui-text); }
.chatd-attach {
  flex-shrink: 0; width: 42px; height: 42px; border-radius: 12px; cursor: pointer;
  background: rgba(255,255,255,.04); border: 1px solid var(--ui-line2); color: var(--ui-muted);
  display: flex; align-items: center; justify-content: center;
}
.chatd-attach:hover { color: var(--ui-text); border-color: var(--ui-bright); }
.chatd-attach svg { width: 18px; height: 18px; }
.chatd-file-input { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
.chatd-file-label { min-height: 14px; font-size: 11px; color: var(--ui-subtle); padding-left: 2px; }
.chatd-file-note { margin-top: 6px; font-size: 11px; color: var(--ui-muted); }
.chatd-input {
  flex: 1; resize: none; max-height: 160px; min-height: 42px;
  background: rgba(255,255,255,.04); border: 1px solid var(--ui-line2); border-radius: 12px;
  padding: 11px 13px; font-size: 14px; color: var(--ui-text); font-family: inherit; line-height: 1.4;
}
.chatd-input::placeholder { color: var(--ui-subtle); }
.chatd-input:focus { outline: none; border-color: var(--ui-bright); }
.chatd-send {
  flex-shrink: 0; width: 42px; height: 42px; border-radius: 12px; border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--ui-bright), #1f9c38); color: #06210f;
  display: flex; align-items: center; justify-content: center;
}
.chatd-send svg { width: 18px; height: 18px; }
.chatd-send:disabled { opacity: .5; cursor: default; }
.chatd-think { font-size: 12.5px; color: var(--ui-muted); margin-right: 8px; }
.chatd-bubble-error { background: rgba(248,113,113,.1) !important; border: 1px solid rgba(248,113,113,.32) !important; }
.chatd-bubble-error .chatd-text { color: #fca5a5; }
.chatd-dots { display: inline-flex; gap: 4px; align-items: center; padding: 3px 0; }
.chatd-dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--ui-muted); animation: chatd-bounce 1.2s infinite ease-in-out; }
.chatd-dots i:nth-child(2) { animation-delay: .15s; }
.chatd-dots i:nth-child(3) { animation-delay: .3s; }
@keyframes chatd-bounce { 0%,60%,100% { opacity:.3; transform: translateY(0);} 30% { opacity:1; transform: translateY(-4px);} }
.chatd-messages .message-markdown { font-size: 14px; line-height: 1.55; color: var(--ui-text); }
.chatd-messages .message-markdown p { margin: 0 0 8px; }
.chatd-messages .message-markdown strong { color: var(--ui-text); font-weight: 700; }
.chatd-messages .message-markdown ul, .chatd-messages .message-markdown ol { margin: 6px 0; padding-left: 18px; }

/* ============================================================
   DESIGN KIT  ·  единые компоненты для всего сайта
   Чтобы не переделывать одни и те же ошибки на каждом экране:
   модалки, читаемый текст, сетки ключ→значение, пустые стейты, прогресс.
   ============================================================ */

/* — Модалка подтверждения / диалог (заменяет native confirm) — */
.pl-modal-overlay { position: fixed; inset: 0; z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(6,8,12,.66); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); opacity: 0; transition: opacity .18s ease; }
.pl-modal-overlay.open { display: flex; opacity: 1; }
.pl-modal { width: 100%; max-width: 420px; background: var(--ui-bg1); border: 1px solid var(--ui-line2); border-radius: 18px; box-shadow: 0 24px 60px rgba(0,0,0,.5); overflow: hidden; transform: translateY(10px) scale(.985); transition: transform .2s cubic-bezier(.2,.8,.2,1); }
.pl-modal-overlay.open .pl-modal { transform: none; }
.pl-modal-body { display: flex; gap: 14px; padding: 24px 24px 18px; align-items: flex-start; }
.pl-modal-icon { flex-shrink: 0; width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; background: var(--ui-glass2); color: var(--ui-bright); }
.pl-modal-icon svg { width: 22px; height: 22px; }
.pl-modal-icon.danger { color: #f87171; background: rgba(248,113,113,.12); }
.pl-modal-text { font-size: 15px; line-height: 1.55; color: var(--ui-text); padding-top: 6px; }
.pl-modal-actions { display: flex; justify-content: flex-end; gap: 10px; padding: 0 24px 22px; }
.ui-btn.danger { background: linear-gradient(135deg, #ef4444, #b91c1c); }
@media (max-width: 520px) {
  .pl-modal-overlay { align-items: flex-end; padding: 0; }
  .pl-modal { max-width: none; border-radius: 18px 18px 0 0; }
  .pl-modal-actions { flex-direction: column-reverse; }
  .pl-modal-actions .ui-btn, .pl-modal-actions .ui-btn-ghost { width: 100%; justify-content: center; }
}

/* — Читаемый markdown отчёта/ответа (акценты, заголовки, списки, таблицы) — */
.pl-prose { font-size: 15px; line-height: 1.68; color: var(--ui-text); }
.pl-prose > :first-child { margin-top: 0; }
.pl-prose > :last-child { margin-bottom: 0; }
.pl-prose p { margin: 0 0 14px; }
.pl-prose h1, .pl-prose h2, .pl-prose h3, .pl-prose h4 { color: #fff; font-weight: 700; line-height: 1.3; margin: 26px 0 12px; letter-spacing: -.01em; }
.pl-prose h1 { font-size: 22px; }
.pl-prose h2 { font-size: 18px; padding-bottom: 8px; border-bottom: 1px solid var(--ui-line); }
.pl-prose h3 { font-size: 15.5px; }
.pl-prose h4 { font-size: 14px; color: var(--ui-text); }
.pl-prose strong, .pl-prose b { color: #fff; font-weight: 700; }
.pl-prose em { color: var(--ui-bright); font-style: normal; }
.pl-prose a { color: var(--ui-bright); text-decoration: underline; text-underline-offset: 2px; }
.pl-prose ul, .pl-prose ol { margin: 0 0 14px; padding-left: 22px; }
.pl-prose li { margin: 0 0 7px; }
.pl-prose li::marker { color: var(--ui-glow); }
.pl-prose blockquote { margin: 16px 0; padding: 6px 16px; border-left: 3px solid var(--ui-glow); color: var(--ui-muted); background: var(--ui-glass); border-radius: 0 8px 8px 0; }
.pl-prose code { background: var(--ui-glass2); padding: 2px 6px; border-radius: 6px; font-size: 13px; color: var(--ui-bright); }
.pl-prose pre { background: var(--ui-bg2); border: 1px solid var(--ui-line); border-radius: 12px; padding: 14px 16px; overflow-x: auto; margin: 0 0 16px; }
.pl-prose pre code { background: none; padding: 0; color: var(--ui-text); }
.pl-prose table { width: 100%; border-collapse: collapse; margin: 0 0 16px; font-size: 14px; }
.pl-prose th, .pl-prose td { border: 1px solid var(--ui-line); padding: 8px 12px; text-align: left; vertical-align: top; }
.pl-prose th { background: var(--ui-glass); color: var(--ui-text); font-weight: 600; }
.pl-prose hr { border: none; border-top: 1px solid var(--ui-line); margin: 22px 0; }

/* — Сетка «ключ → значение» (фокус запуска, параметры) — */
.pl-meta { display: grid; grid-template-columns: minmax(140px, 200px) 1fr; gap: 1px; background: var(--ui-line); border: 1px solid var(--ui-line); border-radius: 14px; overflow: hidden; }
.pl-meta dt { background: var(--ui-glass2); padding: 13px 16px; font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--ui-muted); font-weight: 600; margin: 0; overflow-wrap: anywhere; }
.pl-meta dd { background: var(--ui-glass); padding: 13px 18px; margin: 0; font-size: 14px; line-height: 1.6; color: var(--ui-text); overflow-wrap: anywhere; }
@media (max-width: 600px) { .pl-meta { grid-template-columns: 1fr; } .pl-meta dt { padding-bottom: 3px; } .pl-meta dd { padding-top: 5px; } }

/* — Честный пустой стейт — */
.pl-empty { border: 1px dashed var(--ui-line2); border-radius: 14px; padding: 22px; text-align: center; color: var(--ui-muted); font-size: 13.5px; line-height: 1.6; background: var(--ui-glass); }
.pl-empty .pl-empty-t { color: var(--ui-text); font-weight: 600; margin-bottom: 4px; }

/* — Подключённые пакеты данных (карточки источников на странице разбора) — */
.sp-attached-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
.sp-eyebrow { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--ui-subtle); margin-bottom: 4px; }
.sp-attached-count { font-size: 12px; font-family: "JetBrains Mono", monospace; color: var(--ui-subtle); white-space: nowrap; flex-shrink: 0; }
.sp-attached-grid { display: grid; gap: 12px; }
@media (min-width: 768px) { .sp-attached-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
.sp-tile { display: block; border: 1px solid var(--ui-line); border-radius: 14px; background: var(--ui-glass); padding: 16px 18px; text-decoration: none; transition: background .15s ease, border-color .15s ease, transform .15s ease; }
.sp-tile:hover { background: var(--ui-glass2); border-color: var(--ui-line2); transform: translateY(-1px); }
.sp-tile-title { font-size: 14.5px; font-weight: 700; line-height: 1.35; color: var(--ui-text); }
.sp-tile-meta { margin-top: 6px; font-size: 12px; line-height: 1.5; color: var(--ui-muted); }
.sp-tile-chips { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 7px; }
.sp-chip { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--ui-line2); background: var(--ui-glass2); font-size: 11px; font-weight: 600; color: var(--ui-muted); }

/* — Недоступная функция: единый приём «серый + значок недоступно» —
   Класс .pl-na вешается на любую недоступную фичу (через макрос _unavailable.html
   или вручную). Плюс авто-серый для любых disabled/aria-disabled контролов. */
.pl-na { opacity: .5; cursor: not-allowed; }
.pl-na, .pl-na * { color: var(--ui-subtle) !important; }
.pl-na input, .pl-na button, .pl-na a, .pl-na select, .pl-na textarea { pointer-events: none; }
.pl-na-badge {
  display: inline-flex; align-items: center; gap: 5px;
  margin-left: 8px; padding: 2px 9px;
  border-radius: 999px; border: 1px solid var(--ui-line2);
  background: var(--ui-glass); color: var(--ui-subtle);
  font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  white-space: nowrap;
}
.pl-na-badge::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--ui-subtle); flex-shrink: 0; }
/* авто-серый для отключённых контролов по всему приложению */
.ui label:has(> input:disabled),
.ui label:has(> select:disabled),
.ui [aria-disabled="true"] { opacity: .55; cursor: not-allowed; }

/* — Рабочий экран процесса: панели правки входа (прогрессивное раскрытие) — */
.pl-panels-head { margin-bottom: 14px; }
.pl-panels-sub { margin-top: 4px; font-size: 13px; line-height: 1.5; color: var(--ui-muted); }
.pl-panel { border: 1px solid var(--ui-line); border-radius: 14px; background: var(--ui-glass); overflow: hidden; }
.pl-panel + .pl-panel { margin-top: 10px; }
.pl-panel-sum { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 15px 18px; cursor: pointer; list-style: none; }
.pl-panel-sum::-webkit-details-marker { display: none; }
.pl-panel-sum::after { content: "⌄"; color: var(--ui-subtle); font-size: 16px; line-height: 1; flex-shrink: 0; transition: transform .18s ease; }
.pl-panel[open] > .pl-panel-sum::after { transform: rotate(180deg); }
.pl-panel-sum:hover { background: var(--ui-glass2); }
.pl-panel-titlewrap { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.pl-panel-title { font-size: 14.5px; font-weight: 700; color: var(--ui-text); }
.pl-panel-hint { font-size: 12px; color: var(--ui-subtle); }
.pl-panel-body { padding: 16px 18px 18px; border-top: 1px solid var(--ui-line); }
.pl-panel-note { font-size: 13px; line-height: 1.55; color: var(--ui-muted); margin-bottom: 12px; }
.pl-fold-card,
.pl-fold-card[data-fold-ready="true"] {
  /* BUG-21→34 п.1: у report-body карточек («Основание отчёта», «Сводка
     доказательств») Tailwind p-6 перебивал обнуление padding, из-за чего шапка
     и её hover-подсветка были инсетнуты «прямоугольником внутри». Более
     специфичный селектор гарантирует padding:0 — подсветка тянется до краёв. */
  padding: 0 !important;
  overflow: hidden;
}
.pl-fold-summary {
  width: 100%;
  border: 0;
  background: transparent;
  color: inherit;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 22px 28px;
  cursor: pointer;
  text-align: left;
}
.pl-fold-summary:hover { background: var(--ui-glass2); }
.pl-fold-titlewrap { min-width: 0; display: flex; flex-direction: column; gap: 5px; }
.pl-fold-title { font-size: 17px; line-height: 1.2; font-weight: 800; color: var(--ui-text); }
.pl-fold-count { flex-shrink: 0; font: 600 12px/1.2 var(--ui-mono); color: var(--ui-subtle); text-align: right; }
.pl-fold-chevron {
  width: 26px;
  height: 26px;
  border-radius: 999px;
  border: 1px solid var(--ui-line);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--ui-subtle);
  flex-shrink: 0;
  transition: transform .16s ease, border-color .16s ease, color .16s ease;
}
.pl-fold-card[data-fold-expanded="true"] .pl-fold-chevron {
  transform: rotate(180deg);
  border-color: var(--ui-bright);
  color: var(--ui-bright);
}
.pl-fold-body {
  padding: 18px 28px 28px;
  border-top: 1px solid var(--ui-line);
}
.pl-fold-card[data-fold-expanded="false"] .pl-fold-body { display: none; }
.pl-fold-card[data-fold-expanded="true"] .pl-fold-body { display: block; }
.pl-field { display: block; }
.pl-field-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--ui-muted); margin-bottom: 6px; }
.pl-field-hint { display: block; font-size: 11.5px; color: var(--ui-subtle); margin-top: 6px; line-height: 1.4; }
.pl-checkchip { display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 999px; border: 1px solid var(--ui-line2); background: var(--ui-glass); cursor: pointer; font-size: 12.5px; color: var(--ui-muted); user-select: none; }
.pl-checkchip:hover { background: var(--ui-glass2); }
.pl-checkchip input { accent-color: var(--ui-green); width: 14px; height: 14px; flex-shrink: 0; }
.pl-checkchip:has(input:checked) { border-color: var(--ui-bright); color: var(--ui-text); background: var(--ui-glass2); }
/* — Компактный прогресс этапов (тонкие сегменты вместо больших пилюль) — */
.pl-steps { display: flex; gap: 4px; }
.pl-step { position: relative; flex: 1; min-width: 12px; height: 5px; border-radius: 3px; background: var(--ui-line2); }
.pl-step.done { background: var(--ui-green); }
.pl-step.active { background: var(--ui-glow); animation: pl-step-pulse 1.4s ease-in-out infinite; }
.pl-step.err { background: #f87171; }
@keyframes pl-step-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
/* увеличенная зона наведения над тонкой полосой */
.pl-step::before { content: ""; position: absolute; inset: -10px 0; }
.pl-step:hover { background: var(--ui-bright); }
.pl-step.done:hover { background: var(--ui-bright); }
/* Tooltip lives in an attribute, not nested text, so failed CSS cannot leak prose into layout. */
.pl-step[data-step-tip]::after {
  content: attr(data-step-tip);
  position: absolute; bottom: calc(100% + 12px); left: 50%;
  transform: translateX(-50%) translateY(5px);
  z-index: 50; width: max-content; max-width: 260px; padding: 10px 12px; border-radius: 11px;
  background: rgba(18,22,25,.98); border: 1px solid var(--ui-line2);
  box-shadow: 0 14px 36px -8px rgba(0,0,0,.72);
  color: var(--ui-text); font-size: 12px; font-weight: 650; line-height: 1.4;
  opacity: 0; visibility: hidden; pointer-events: none; text-align: left; white-space: normal;
  transition: opacity .14s ease, transform .14s ease;
}
.pl-step[data-step-tip]:hover::after,
.pl-step[data-step-tip]:focus::after,
.pl-step[data-step-tip]:focus-visible::after {
  opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0);
}
.pl-step[data-step-tip]:first-child::after { left: 0; transform: translateX(0) translateY(5px); }
.pl-step[data-step-tip]:first-child:hover::after,
.pl-step[data-step-tip]:first-child:focus::after,
.pl-step[data-step-tip]:first-child:focus-visible::after { transform: translateX(0) translateY(0); }
.pl-step[data-step-tip]:last-child::after { left: auto; right: 0; transform: translateX(0) translateY(5px); }
.pl-step[data-step-tip]:last-child:hover::after,
.pl-step[data-step-tip]:last-child:focus::after,
.pl-step[data-step-tip]:last-child:focus-visible::after { transform: translateX(0) translateY(0); }
/* ховер-подсказка по этапу: имя + что делает + статус */
.pl-step-tip {
  position: absolute; bottom: calc(100% + 12px); left: 50%;
  transform: translateX(-50%) translateY(5px);
  z-index: 50; width: 216px; padding: 10px 12px; border-radius: 11px;
  background: rgba(18,22,25,.98); border: 1px solid var(--ui-line2);
  box-shadow: 0 14px 36px -8px rgba(0,0,0,.72);
  opacity: 0; visibility: hidden; pointer-events: none; text-align: left;
  transition: opacity .14s ease, transform .14s ease;
}
.pl-step:hover .pl-step-tip, .pl-step:focus-visible .pl-step-tip {
  opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0);
}
.pl-step:first-child .pl-step-tip { left: 0; transform: translateX(0) translateY(5px); }
.pl-step:first-child:hover .pl-step-tip { transform: translateX(0) translateY(0); }
.pl-step:last-child .pl-step-tip { left: auto; right: 0; transform: translateX(0) translateY(5px); }
.pl-step:last-child:hover .pl-step-tip { transform: translateX(0) translateY(0); }
.pl-step-tip::after {
  content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  border: 6px solid transparent; border-top-color: rgba(18,22,25,.98);
}
.pl-step-tip b { display: block; font-size: 12.5px; font-weight: 700; color: var(--ui-text); }
.pl-step-tip em { display: block; margin-top: 3px; font-size: 11.5px; line-height: 1.45; color: var(--ui-muted); font-style: normal; }
.pl-step-tip s { display: block; margin-top: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; text-decoration: none; }

/* — Живой прогресс «идёт исследование» — */
.pl-live { display: flex; gap: 16px; align-items: flex-start; padding: 20px 22px; border: 1px solid var(--ui-line2); border-radius: 16px; background: linear-gradient(180deg, var(--ui-glass2), var(--ui-glass)); }
.pl-live-spin { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; border: 3px solid var(--ui-line2); border-top-color: var(--ui-bright); animation: pl-spin .9s linear infinite; }
@keyframes pl-spin { to { transform: rotate(360deg); } }
.pl-live-body { flex: 1; min-width: 0; }
.pl-live-step { font-size: 15px; font-weight: 600; color: var(--ui-text); }
.pl-live-meta { margin-top: 4px; font-size: 12.5px; color: var(--ui-muted); }
.pl-live-bar { margin-top: 12px; height: 4px; border-radius: 4px; background: var(--ui-line); overflow: hidden; }
.pl-live-bar > i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--ui-glow), var(--ui-bright)); transition: width .6s ease; }
.pl-live.error { background: rgba(248,113,113,.07); border-color: rgba(248,113,113,.35); }
.pl-live.error .pl-live-spin { display: none; }
.pl-live.error .pl-live-bar { background: rgba(248,113,113,.18); }
.pl-live.error .pl-live-bar > i { background: #f87171; }
.pl-live-ico-err { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; display: none; place-items: center; background: rgba(248,113,113,.14); color: #f87171; }
.pl-live.error .pl-live-ico-err { display: grid; }
.pl-live.error .pl-live-step { color: #fca5a5; }

/* — Поле формы кита (читаемое, не сжатое) — */
.pl-field { display: block; margin-bottom: 16px; }
.pl-field > .pl-label { display: block; font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; color: var(--ui-muted); margin-bottom: 6px; }
.pl-field > .pl-hint { font-size: 12px; color: var(--ui-subtle); margin-top: 6px; line-height: 1.5; }

/* — Общая защита от «текст не влезает / обрезан» на любом экране — */
.ui h1, .ui h2, .ui h3, .ui h4, .ui .ui-h1, .ui .ui-h2 { overflow-wrap: break-word; word-break: normal; }
.ui-card, .ui-section { min-width: 0; }
.ui-card { overflow-wrap: break-word; }

/* — СИСТЕМНЫЙ ВЕРТИКАЛЬНЫЙ РИТМ ПО ВСЕМУ САЙТУ ───────────────────────────
   Вертикальные стопки были слишком тесные (Tailwind space-y-* по 8–24px).
   Поднимаем равномерно — сайт начинает дышать на каждом экране.
   Трогаем только вертикаль (не gap у горизонтальных рядов — там риск). */
.ui .space-y-2 > :not([hidden]) ~ :not([hidden]) { margin-top: 11px; }
.ui .space-y-3 > :not([hidden]) ~ :not([hidden]) { margin-top: 16px; }
.ui .space-y-4 > :not([hidden]) ~ :not([hidden]) { margin-top: 22px; }
.ui .space-y-5 > :not([hidden]) ~ :not([hidden]) { margin-top: 26px; }
.ui .space-y-6 > :not([hidden]) ~ :not([hidden]) { margin-top: 32px; }
/* Заголовки внутри карточек не липнут к контенту */
.ui .ui-card > h2:first-child, .ui .ui-card > h3:first-child { margin-bottom: 16px; }

/* — Формам воздух: подпись не липнет к полю (мелкий mb-1 у капшенов → 8px) — */
.ui form label > span.mb-1 { margin-bottom: 8px !important; }
.ui form label.block { display: block; }

/* ── КОРЕНЬ «БЕЛЫХ РАМОЧЕК»: дефолт бордюра Tailwind = #e5e7eb (светло-серый).
   Через :where (0 специфичности) задаём тихий тёмный бордюр всем голым border-*,
   не перебивая явные border-{color} классы. ───────────────────────────────── */
.ui :where(.border, .border-t, .border-r, .border-b, .border-l, .border-x, .border-y, .border-2, .border-dashed) {
  border-color: var(--ui-line);
}

/* ── СВЕТЛЫЕ ПЯТНА: классы светлой палитры, не покрытые тёмной темой,
   переводим в тёмные тон-в-тон (scoped .ui; standalone email/consent не задеты). */
.ui .bg-red-100 { background: rgba(248,113,113,.12) !important; }
.ui .text-red-700, .ui .text-red-600 { color: #fca5a5 !important; }
.ui .bg-blue-100, .ui .bg-blue-50\/60, .ui .bg-indigo-50 { background: rgba(96,165,250,.12) !important; }
.ui .text-blue-700, .ui .text-blue-600, .ui .text-indigo-900 { color: #93c5fd !important; }
.ui .bg-amber-100 { background: rgba(251,191,36,.14) !important; }
.ui .text-amber-500, .ui .text-amber-600 { color: #fcd34d !important; }
.ui .bg-violet-50 { background: rgba(139,92,246,.10) !important; }
.ui .text-violet-600, .ui .text-violet-700, .ui .text-violet-800 { color: #c4b5fd !important; }
.ui .bg-sber-100 { background: rgba(33,160,56,.14) !important; }
.ui .border-amber-100, .ui .border-blue-100, .ui .border-violet-100,
.ui .border-sber-100, .ui .border-indigo-400, .ui .border-red-200 { border-color: var(--ui-line2) !important; }
.ui .to-white { --tw-gradient-to: rgba(255,255,255,0) !important; }

/* ── Нативные input[type=file]: «Choose File» больше не белая системная кнопка ── */
.ui input[type="file"] { color: var(--ui-muted); font-size: 13px; max-width: 100%; }
.ui input[type="file"]::file-selector-button {
  background: var(--ui-glass2); color: var(--ui-text);
  border: 1px solid var(--ui-line2); border-radius: 9px;
  padding: 7px 14px; margin-right: 12px; font-weight: 600; font-size: 13px;
  cursor: pointer; transition: background .15s, border-color .15s;
}
.ui input[type="file"]::file-selector-button:hover { background: var(--ui-glass); border-color: var(--ui-bright); }

/* ── МЕЛКИЕ СЖАТЫЕ ЧИПЫ: 10px + py-0.5 (2px) = тесные пилюли в рамках по всему
   сайту. Поднимаем кегль до 11px и даём воздух внутри. ───────────────────── */
.ui .text-\[10px\] { font-size: 11px !important; }
.ui .text-\[11px\] { font-size: 11.5px !important; }
/* пилюли (rounded-full / rounded со скруглением) с мелким текстом — распереть */
.ui .rounded-full.text-\[10px\], .ui .rounded-full.text-\[11px\],
.ui .rounded.text-\[10px\], .ui .rounded-md.text-\[10px\] {
  padding-top: 3px !important; padding-bottom: 3px !important;
  padding-left: 10px !important; padding-right: 10px !important;
  line-height: 1.45 !important;
}
/* пастельные чипы-категории: тише фон, единый тихий бордюр, чтобы не пестрили */
.ui .rounded-full.bg-sber-50, .ui .rounded-full.bg-amber-50,
.ui .rounded-full.bg-blue-50, .ui .rounded-full.bg-ink-100,
.ui .rounded-full.bg-ink-50 { border-color: var(--ui-line) !important; }
/* ряды чипов не слипаются: gap-1/gap-1.5 (4–6px) → больше воздуха */
.ui .flex-wrap.gap-1 { gap: 7px !important; }
.ui .flex-wrap.gap-1\.5 { gap: 8px !important; }

/* — Чиним «белые тесные формы» по всему приложению: светлые tailwind-поля
   (bg-white / bg-ink-50 / hairline-бордюр) на тёмных экранах перекрашиваем в тёмные,
   читаемые и чуть просторнее. Только поля ввода; контейнеры с теми же классами не трогаем.
   Standalone-страницы (email, consent) не имеют .ui — их это не касается. */
.ui input.bg-white, .ui input.bg-ink-50,
.ui textarea.bg-white, .ui textarea.bg-ink-50,
.ui select.bg-white, .ui select.bg-ink-50 {
  background: rgba(255,255,255,.04) !important;
  color: var(--ui-text) !important;
  border-color: var(--ui-line2) !important;
  padding-top: 9px !important;
  padding-bottom: 9px !important;
}
.ui input.bg-white::placeholder, .ui textarea.bg-white::placeholder,
.ui input.bg-ink-50::placeholder, .ui textarea.bg-ink-50::placeholder { color: var(--ui-subtle) !important; }
.ui input.bg-white:focus, .ui input.bg-ink-50:focus,
.ui textarea.bg-white:focus, .ui textarea.bg-ink-50:focus,
.ui select.bg-white:focus, .ui select.bg-ink-50:focus { border-color: rgba(255,255,255,.34) !important; }
.ui select.bg-white option, .ui select.bg-ink-50 option { background: var(--ui-bg1); color: var(--ui-text); }

/* ── Мобильный чат-дровер: чёлка + клавиатура + анти-зум iOS ─────────── */
.chatd-drawer { height: 100dvh; }
.chatd-head {
  padding-top: calc(16px + env(safe-area-inset-top));
  padding-right: calc(18px + env(safe-area-inset-right));
}
@media (max-width: 560px) {
  .chatd-drawer { width: 100vw; border-left: none; }
  .chatd-composer { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
  .chatd-input { font-size: 16px; }
}

/* iOS не зумит при фокусе на поле, если шрифт ≥16px — глобально для всех полей
   на узких экранах (логин, формы, фокусное, админка и т.д.). */
@media (max-width: 768px) {
  input:not([type="checkbox"]):not([type="radio"]):not([type="range"]):not([type="file"]):not([type="color"]),
  textarea,
  select {
    font-size: 16px !important;
  }
}

/* ── Уважение к «уменьшить движение» ───────────────────────
   Кто включил в системе reduce-motion — получает полностью статичный фон:
   ноль бесконечных анимаций → GPU в простое, ноль нагрева. Функциональные
   индикаторы (спиннеры, прогресс) НЕ трогаем — они несут смысл. */
@media (prefers-reduced-motion: reduce) {
  .ui-bloom { animation: none !important; }
  .ui-nav-wordmark { animation: none !important; background-position: 0 0; }
  .ui-badge.progress .dot { animation: none !important; }
}

/* ════════════════════════════════════════════════════════════════
   Workflow аналитики (wf-) — командный мостик + ось вкладок + панели.
   Структура и пропорции из утверждённого макета docs/mockups/analysis-workflow.html,
   адаптированы под токены --pl-*/--ui-* (тёмная тема). Префикс wf-, существующие
   классы не трогаем. Мостик переиспользует .report-hero/.rp-badge/.rp-star-btn.
   ════════════════════════════════════════════════════════════════ */

/* ── Крошки мостика ── */
.wf-crumb-id {
  padding: 2px 7px;
  border: 1px solid var(--pl-line-2);
  border-radius: var(--pl-radius-full);
  color: var(--pl-text-2);
  font-family: var(--pl-font-mono);
}
.wf-crumb-quality { color: var(--pl-accent-bright); font-family: var(--pl-font-mono); }

/* ── Блок действий мостика (статус + главное действие + меню) ── */
.wf-bridge-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  flex-wrap: wrap;
  justify-content: flex-end;
}

/* Одно главное действие по состоянию — крупная зелёная кнопка. */
.wf-action-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 13px;
  padding: 10px 18px;
  border: none;
  border-radius: var(--pl-radius-md);
  background: linear-gradient(135deg, var(--pl-accent), var(--pl-accent-glow));
  color: #04130a;
  box-shadow: var(--pl-shadow-btn);
  cursor: pointer;
  text-decoration: none;
  transition: transform .15s ease, box-shadow .15s ease;
  white-space: nowrap;
}
.wf-action-btn:hover { transform: translateY(-1px); box-shadow: var(--pl-shadow-btn-hover); }
.wf-action-btn svg { width: 15px; height: 15px; }
.wf-action-btn.warn {
  background: linear-gradient(135deg, #B45309, #D97706);
  color: #1c1003;
  box-shadow: 0 14px 36px -10px rgba(217,119,6,.4);
}

/* ── Меню «⋯» ── */
.wf-more { position: relative; }
.wf-more-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 38px; height: 38px;
  border-radius: var(--pl-radius-md);
  border: 1px solid var(--pl-line-2);
  background: var(--pl-glass);
  color: var(--pl-text-0);
  cursor: pointer;
  transition: background .15s ease, border-color .15s ease;
}
.wf-more-toggle:hover { background: var(--pl-glass-2); border-color: rgba(255,255,255,.22); }
.wf-more-toggle svg { width: 16px; height: 16px; }
.wf-menu {
  position: absolute;
  right: 0;
  top: calc(100% + 6px);
  min-width: 240px;
  background: var(--pl-bg-2);
  border: 1px solid var(--pl-line-2);
  border-radius: var(--pl-radius-md);
  box-shadow: var(--pl-shadow-card);
  padding: 6px;
  display: none;
  z-index: 60;
}
.wf-more.open .wf-menu { display: block; }
.wf-menu a,
.wf-menu button {
  display: flex;
  width: 100%;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border: none;
  background: none;
  border-radius: var(--pl-radius-sm);
  font-size: 12.5px;
  font-family: var(--pl-font-ui);
  color: var(--pl-text-0);
  text-align: left;
  text-decoration: none;
  cursor: pointer;
}
.wf-menu form { margin: 0; }
.wf-menu a:hover,
.wf-menu button:hover { background: var(--pl-glass-2); }
.wf-menu svg { width: 14px; height: 14px; color: var(--pl-text-2); flex-shrink: 0; }
.wf-menu hr { border: 0; border-top: 1px solid var(--pl-line); margin: 5px 4px; }
.wf-menu .wf-menu-danger { color: #FCA5A5; }
.wf-menu .wf-menu-danger svg { color: #FCA5A5; }

/* ── Паспорт-лента: одна строка правды о прогоне ── */
.wf-passport {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 20px;
  margin-top: 16px;
  padding: 11px 16px;
  border: 1px solid var(--pl-line);
  border-radius: var(--pl-radius-lg);
  background: linear-gradient(180deg, var(--pl-glass-2), var(--pl-glass));
  font: 12px var(--pl-font-mono);
  color: var(--pl-text-1);
}
.wf-passport b { color: var(--pl-text-0); font-weight: 600; }
.wf-passport .sep { color: var(--pl-text-2); opacity: .5; }
.wf-passport .wf-q-ok   { color: var(--pl-accent-bright); }
.wf-passport .wf-q-weak { color: #FDBA74; }
.wf-passport .wf-q-fail { color: #FCA5A5; }

/* ── Ось workflow: 5 sticky-вкладок ── */
.wf-axis {
  position: relative;
  z-index: 30;
  display: flex;
  gap: 6px;
  margin: 18px auto 0;
  max-width: 1380px;
  padding: 6px;
  border: 1px solid var(--pl-line);
  border-radius: var(--pl-radius-xl);
  background: rgba(10,12,14,.72);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  position: sticky;
  top: 10px;
}
.wf-stage {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  padding: 10px 14px;
  border: none;
  border-radius: var(--pl-radius-lg);
  background: none;
  color: var(--pl-text-0);
  cursor: pointer;
  text-align: left;
  transition: background .15s ease;
}
.wf-stage:hover { background: var(--pl-glass); }
.wf-stage.is-active {
  background: linear-gradient(180deg, rgba(33,160,56,.16), rgba(33,160,56,.06));
  box-shadow: inset 0 0 0 1px rgba(62,207,103,.3);
}
.wf-stage-ic {
  width: 30px; height: 30px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  background: var(--pl-glass-2);
  border: 1px solid var(--pl-line-2);
  flex-shrink: 0;
}
.wf-stage-ic svg { width: 15px; height: 15px; color: var(--pl-text-1); }
.wf-stage.done .wf-stage-ic { background: rgba(33,160,56,.14); border-color: rgba(62,207,103,.35); }
.wf-stage.done .wf-stage-ic svg { color: var(--pl-accent-glow); }
.wf-stage.live .wf-stage-ic { border-color: rgba(217,119,6,.45); background: rgba(217,119,6,.12); }
.wf-stage.live .wf-stage-ic svg { color: #F59E0B; }
.wf-stage.fail .wf-stage-ic { border-color: rgba(220,38,38,.45); background: rgba(220,38,38,.12); }
.wf-stage.fail .wf-stage-ic svg { color: #F87171; }
.wf-stage-tx { min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.wf-stage-nm { font-weight: 600; font-size: 12.5px; white-space: nowrap; }
.wf-stage-st {
  font: 10px var(--pl-font-mono);
  color: var(--pl-text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.wf-stage.is-active .wf-stage-st { color: var(--pl-text-1); }
@media (max-width: 880px) {
  .wf-axis { flex-wrap: wrap; }
  .wf-stage { flex: 1 1 40%; }
  .wf-stage-st { white-space: normal; }
}

/* ── Постоянная полка «Параллельные взгляды» (под осью, видна на всех вкладках) ──
   ПСС и фокусное = отдельные аналитики на том же входе. Лёгкая, тёмная, часть
   мостика: те же токены, что и ось, но приглушённее (не перетягивает стадии). */
.wf-views-rail {
  max-width: 1380px;
  margin: 8px auto 0;
  padding: 8px 14px 10px;
  border: 1px solid var(--pl-line);
  border-radius: var(--pl-radius-lg);
  background: rgba(10,12,14,.45);
}
.wf-views-eyebrow {
  font: 600 9.5px var(--pl-font-mono);
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--pl-text-2);
  margin-bottom: 4px;
}
.wf-views-rail .wf-runline { padding: 6px 0; }
.wf-views-off {
  font-size: 11.5px;
  color: var(--pl-text-2);
  font-style: italic;
  white-space: nowrap;
}
/* Кнопка-тоггл раскрытия строки полки (выглядит как ссылка, ведёт себя как кнопка) */
.wf-views-toggle {
  background: none;
  border: 0;
  padding: 0;
  cursor: pointer;
  font: inherit;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.wf-views-caret { font-size: 9px; transition: transform .15s ease; opacity: .7; }
.wf-views-toggle[aria-expanded="true"] .wf-views-caret { transform: rotate(180deg); }
.wf-views-fullscreen { font-size: 11px; color: var(--pl-text-2); }
.wf-views-fullscreen:hover { color: var(--pl-text-1); }
/* Контейнер инлайн-раскрытия под строкой полки — тёмная карточка прогресса */
.wf-views-expand {
  margin: 8px 0 4px;
  padding-top: 10px;
  border-top: 1px solid var(--pl-line, rgba(255,255,255,.08));
}
.wf-views-expand[hidden] { display: none; }
@media (prefers-reduced-motion: no-preference) {
  .wf-views-expand:not([hidden]) { animation: wf-fadein .2s ease; }
}
@media (max-width: 880px) {
  .wf-views-rail { margin-left: 2rem; margin-right: 2rem; }
}

/* ── Карточка прогресса прогона (тёмная, язык wf-*) — партиал run_progress.html.
   Заменила старый светлый блок (белый на тёмном фоне, статус не виден). ── */
.wf-progress-hd {
  display: flex; flex-wrap: wrap; align-items: flex-start;
  justify-content: space-between; gap: 12px;
}
.wf-progress-hd-l { min-width: 0; }
.wf-progress-eyebrow {
  font: 600 9.5px var(--pl-font-mono);
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--pl-text-2);
}
.wf-progress-title { margin-top: 3px; font-size: 14px; font-weight: 700; color: var(--pl-text-0); }
.wf-progress-stage { margin-top: 3px; font-size: 12px; color: var(--pl-text-2); }
.wf-progress-hd-r { flex-shrink: 0; text-align: right; }
.wf-progress-pct {
  font: 700 18px var(--pl-font-mono);
  color: var(--pl-accent-bright);
  line-height: 1;
}
.wf-progress-pct.is-ready { color: var(--pl-accent-glow); }
.wf-progress-pct.is-fail  { color: #FCA5A5; }
.wf-progress-pct.is-muted { color: var(--pl-text-2); }
.wf-progress-elapsed { margin-top: 4px; font-size: 11px; color: var(--pl-text-2); }
.wf-progress-track {
  margin-top: 12px; height: 8px; border-radius: var(--pl-radius-full);
  background: var(--pl-line, rgba(255,255,255,.08)); overflow: hidden;
}
.wf-progress-fill {
  height: 100%; border-radius: var(--pl-radius-full);
  background: linear-gradient(90deg, var(--pl-accent, #21A038), var(--pl-accent-glow, #2EC04A));
  transition: width .4s ease;
}
.wf-progress-fill.is-ready { background: var(--pl-accent-glow, #2EC04A); }
.wf-progress-fill.is-fail  { background: var(--pl-error, #DC2626); }
.wf-progress .wf-runlog { margin-top: 14px; }
.wf-progress-err {
  margin-top: 12px; padding: 9px 12px;
  border-radius: var(--pl-radius-md);
  border: 1px solid rgba(220,38,38,.35);
  background: rgba(220,38,38,.1);
  font-size: 12px; color: #FCA5A5;
}
.wf-progress-done-actions { margin-top: 14px; display: flex; gap: 8px; }

/* ── Панели вкладок: показываем только активную ── */
.wf-panel { display: none; }
.wf-panel.is-active { display: block; animation: wf-fadein .22s ease; }
@keyframes wf-fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
@media (prefers-reduced-motion: reduce) { .wf-panel.is-active { animation: none; } }
.wf-body { padding-top: 22px; }

/* ── Заголовок карточки внутри панели ── */
.wf-card-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}
.wf-card-title { font-weight: 700; font-size: 14px; color: var(--pl-text-0); }
.wf-card-note { font-size: 11.5px; color: var(--pl-text-2); }
.wf-inline-link { color: var(--pl-info, #1896B4); font-weight: 600; white-space: nowrap; }
.wf-inline-link:hover { text-decoration: underline; }
.wf-setup-launch-note { padding: 18px 20px; }

/* ── Дорожки «Параллельные аналитики» (ПСС / фокусное) ── */
.wf-track {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 13px 16px;
  border: 1px solid var(--pl-line);
  border-radius: var(--pl-radius-lg);
  background: rgba(0,0,0,.22);
}
.wf-track + .wf-track { margin-top: 10px; }
.wf-track-l { display: flex; align-items: center; gap: 12px; min-width: 0; }
.wf-track-nm { font-weight: 600; font-size: 13px; color: var(--pl-text-0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wf-track-meta { font: 10.5px var(--pl-font-mono); color: var(--pl-text-2); margin-top: 2px; }
.wf-track-err { font: 11px var(--pl-font-mono); color: #FCA5A5; margin-top: 3px; }
.wf-track-r { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.wf-track-btn {
  display: inline-flex;
  align-items: center;
  font-size: 12px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: var(--pl-radius-md);
  border: 1px solid var(--pl-line-2);
  background: var(--pl-glass);
  color: var(--pl-text-0);
  text-decoration: none;
  transition: background .15s ease, border-color .15s ease;
  white-space: nowrap;
}
.wf-track-btn:hover { background: var(--pl-glass-2); border-color: rgba(255,255,255,.22); }
.wf-tbadge {
  font: 600 9.5px var(--pl-font-mono);
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: var(--pl-radius-full);
  border: 1px solid;
  white-space: nowrap;
}
.wf-tbadge.pss { color: #7dd3fc; border-color: rgba(56,189,248,.35); background: rgba(14,165,233,.12); }
.wf-tbadge.focused { color: #C4B5FD; border-color: rgba(167,139,250,.35); background: rgba(139,92,246,.12); }
/* Компактный «ход прогона» (вкладка «Прогон»): одна лёгкая строка на параллельный
   прогон — бейдж + имя + модель + статус-пилюля + ссылка. Не карточка (та — на вкладке «Отчёт»). */
.wf-runline { display: flex; align-items: center; gap: 10px; padding: 8px 2px;
  border-top: 1px solid var(--pl-line, rgba(255,255,255,.08)); min-width: 0; }
.wf-runline:first-of-type { border-top: 0; }
.wf-runline-nm { font-size: 12.5px; font-weight: 600; color: var(--pl-text-0);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 1; min-width: 0; }
.wf-runline-meta { font-size: 10.5px; color: var(--pl-text-2); white-space: nowrap; }
.wf-runline-r { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-shrink: 0; }
@media (max-width: 560px) {
  .wf-runline { flex-wrap: wrap; }
  .wf-runline-r { width: 100%; margin-left: 0; justify-content: flex-end; }
}

@media (max-width: 560px) {
  .wf-bridge-actions { width: 100%; justify-content: flex-start; }
  .wf-track { flex-direction: column; align-items: flex-start; }
  .wf-track-r { width: 100%; justify-content: flex-end; }
}
/* Мостик: заголовок рабочего экрана — умеренный (display-масштаб report-hero-title
   оставлен отчёту; здесь инструмент, не афиша). */
.wf-bridge .wf-bridge-title{
  font-family:var(--pl-font-ui);
  font-size:22px;
  font-weight:650;
  letter-spacing:-.01em;
  line-height:1.25;
  text-transform:none;
  text-wrap:balance;
}
/* ── Журнал прогона (вкладка «Прогон», терминальная история) ── */
.wf-card{
  background:linear-gradient(180deg,var(--pl-glass-2,rgba(255,255,255,.07)),var(--pl-glass,rgba(255,255,255,.045)));
  border:1px solid var(--pl-line,rgba(255,255,255,.08));
  border-radius:var(--pl-radius-xl,20px);
  padding:20px;
}
.wf-runlog{position:relative;padding-left:22px;margin-top:6px}
.wf-runlog::before{content:"";position:absolute;left:7px;top:8px;bottom:8px;width:2px;border-radius:2px;
  background:linear-gradient(180deg,var(--pl-accent,#21A038),var(--pl-line-2,rgba(255,255,255,.14)))}
.wf-runlog-row{position:relative;display:flex;align-items:baseline;gap:10px;padding:4px 0}
.wf-runlog-dot{position:absolute;left:-20px;top:8px;width:10px;height:10px;border-radius:50%;
  background:var(--pl-accent,#21A038);border:2px solid var(--pl-bg-1,#0E1013)}
.wf-runlog-row.fail .wf-runlog-dot{background:var(--pl-error,#DC2626)}
/* live-журнал: текущий этап пульсирует (по образцу .step.now из docs/mockups/analysis-workflow.html),
   ещё не начатые этапы — приглушённые серые точки. */
.wf-runlog-row.now .wf-runlog-dot{background:#F59E0B;box-shadow:0 0 0 4px rgba(245,158,11,.18);
  animation:wf-runlog-pulse 1.6s ease-in-out infinite}
.wf-runlog-row.todo .wf-runlog-dot{background:var(--pl-bg-2,#15181c);border-color:var(--pl-line-2,rgba(255,255,255,.14))}
@keyframes wf-runlog-pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media (prefers-reduced-motion: reduce){.wf-runlog-row.now .wf-runlog-dot{animation:none}}
.wf-runlog-name{font-size:12.5px;font-weight:600;color:var(--pl-text-0)}
.wf-runlog-row.fail .wf-runlog-name{color:#FCA5A5}
.wf-runlog-row.todo .wf-runlog-name{color:var(--pl-text-2);font-weight:500}
/* номер этапа перед названием: моноширинный приглушённый индекс, фиксированной
   ширины — названия выстраиваются ровной колонкой. */
.wf-runlog-num{flex:0 0 auto;min-width:1.5em;text-align:right;
  font:600 11px/1.45 var(--pl-font-mono,ui-monospace,monospace);color:var(--pl-text-2)}
.wf-runlog-row.now .wf-runlog-num{color:#F59E0B}
.wf-runlog-row.fail .wf-runlog-num{color:#FCA5A5}
.wf-runlog-row.todo .wf-runlog-num{opacity:.7}
.wf-runlog-time{font-size:11px;color:var(--pl-text-2);margin-left:auto;white-space:nowrap}
/* подпись этапа под именем (live): что сейчас + таймер текущего этапа;
   отступ слева совмещает её с названием (под номером — пусто). */
.wf-runlog-row .wf-runlog-sub{flex-basis:100%;font-size:11px;color:var(--pl-text-2);
  margin-top:2px;line-height:1.4;padding-left:calc(1.5em + 10px)}
.wf-runlog-row.now .wf-runlog-sub{color:var(--pl-text-1,rgba(255,255,255,.78))}
/* Бар «Правки материалов» появляется только когда правки есть (Aleks 12.06:
   «перезапуск будто не на своём месте» — без правок кнопки сбивали с толку).

.ui .material-edit-bar{display:none}
.ui .material-edit-bar.is-dirty{display:flex}
/* ── Ось публикации (карточка готовности): черновик → версия → команда ── */
.wf-pubaxis{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.wf-pubstep{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border-radius:14px;
  border:1px solid var(--pl-card-border,rgba(0,0,0,.08));background:rgba(0,0,0,.02)}
.wf-pubstep.done{border-color:rgba(33,160,56,.3);background:rgba(33,160,56,.05)}
.wf-pubstep.now{border-color:rgba(33,160,56,.45);box-shadow:0 0 0 1px rgba(33,160,56,.2)}
.wf-pubstep-mark{flex-shrink:0;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;
  font:700 12px/1 var(--pl-font-mono,monospace);background:rgba(0,0,0,.06);color:inherit}
.wf-pubstep.done .wf-pubstep-mark{background:var(--pl-accent,#21A038);color:#fff}
.wf-pubstep.now .wf-pubstep-mark{background:rgba(33,160,56,.15);color:var(--pl-accent,#21A038)}
.wf-pubstep-name{font-weight:700;font-size:13px}
.wf-pubstep-note{font-size:11.5px;opacity:.75;margin-top:1px;line-height:1.45}
.wf-pubstep-btn{display:inline-flex;align-items:center;border-radius:10px;padding:6px 12px;
  font-size:12px;font-weight:700;background:var(--pl-accent,#21A038);color:#fff;border:0;cursor:pointer}
.wf-pubstep-btn:hover{filter:brightness(1.08)}
.wf-pubstep-btn.ghost{background:transparent;color:inherit;border:1px solid currentColor;opacity:.7}
/* Строка фактов вместо плиток-рамок (вкладка «Материалы») */
.wf-factline{display:flex;flex-wrap:wrap;gap:6px 10px;align-items:baseline;color:var(--pl-text-1)}
.wf-factline .sep{color:var(--pl-text-2);opacity:.5}

/* ──────────────────────────────────────────────────────────────
   nav.css — единая стеклянная навигация (site-nav*)
   Один бар для всех экранов: layout_ui.html и studio_new.html.
   Стиль — minimal в духе студии: стекло, sticky, ссылки чистым
   текстом с подсветкой активного раздела чертой снизу (без таблеток).
   Все цвета/шрифты — из tokens.css (--pl-*), поэтому вид одинаков
   на body.ui и body.studio.
   ────────────────────────────────────────────────────────────── */

.site-nav {
  position: sticky;
  top: 0;
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 24px;
  /* Безопасная зона под чёлку/динамический остров iPhone. */
  padding-top: calc(14px + env(safe-area-inset-top));
  padding-left: calc(24px + env(safe-area-inset-left));
  padding-right: calc(24px + env(safe-area-inset-right));
  background: color-mix(in srgb, var(--pl-bg-0) 55%, transparent);
  backdrop-filter: blur(26px) saturate(1.2);
  -webkit-backdrop-filter: blur(26px) saturate(1.2);
  border-bottom: 1px solid color-mix(in srgb, var(--pl-line) 70%, transparent);
}

/* Бургер — скрыт на десктопе, показывается на узких экранах. */
.site-nav-burger {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 38px; height: 38px;
  border-radius: 10px;
  cursor: pointer;
  flex-shrink: 0;
  color: inherit;
  background: color-mix(in srgb, currentColor 7%, transparent);
  border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
}
.site-nav-burger span {
  display: block; height: 2px; width: 18px; margin: 0 auto;
  border-radius: 2px; background: currentColor;
  transition: transform .2s ease, opacity .2s ease;
}
.site-nav.nav-open .site-nav-burger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.site-nav.nav-open .site-nav-burger span:nth-child(2) { opacity: 0; }
.site-nav.nav-open .site-nav-burger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.site-nav-scrim { position: fixed; inset: 0; z-index: 55; background: rgba(4,6,7,.5); }
.site-nav-scrim[hidden] { display: none; }
body.nav-locked { overflow: hidden; }

/* ── Узкие экраны: меню в выпадающую панель ─────────────── */
@media (max-width: 860px) {
  .site-nav-burger { display: flex; }
  .site-nav-help { display: none; }
  .site-nav-links {
    position: absolute;
    top: 100%; left: 0; right: 0;
    flex-direction: column;
    align-items: stretch;
    gap: 2px;
    padding: 8px calc(12px + env(safe-area-inset-left)) calc(12px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-right));
    overflow: visible;
    background: color-mix(in srgb, var(--pl-bg-0) 94%, transparent);
    backdrop-filter: blur(26px) saturate(1.2);
    -webkit-backdrop-filter: blur(26px) saturate(1.2);
    border-bottom: 1px solid var(--pl-line);
    box-shadow: 0 24px 50px -18px rgba(0,0,0,.7);
    transform: translateY(-8px);
    opacity: 0;
    pointer-events: none;
    transition: transform .2s ease, opacity .2s ease;
  }
  .site-nav.nav-open .site-nav-links {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  .site-nav-link {
    margin: 0;
    padding: 13px 12px;
    min-height: 44px;
    font-size: 15px;
    border-radius: 12px;
  }
  .site-nav-link svg { width: 18px; height: 18px; }
  .site-nav-link::after { display: none; }
  .site-nav-link.active { background: color-mix(in srgb, var(--pl-accent-bright) 12%, transparent); }
}

/* ── Бренд ─────────────────────────────────────────────────── */
.site-nav-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--pl-text-0);
  flex-shrink: 0;
}
.site-nav-mark {
  width: 36px; height: 36px;
  border-radius: 11px;
  background: linear-gradient(135deg, var(--pl-accent), var(--pl-accent-glow));
  display: grid;
  place-items: center;
  box-shadow: 0 8px 24px -6px color-mix(in srgb, var(--pl-accent) 60%, transparent);
  flex-shrink: 0;
}
.site-nav-mark svg { width: 20px; height: 20px; }
.site-nav-titles { display: flex; flex-direction: column; min-width: 0; }
.site-nav-wordmark {
  font-family: var(--pl-font-display);
  font-weight: 800;
  font-size: 15px;
  letter-spacing: -.02em;
  background: linear-gradient(100deg, #B4BCB6 0%, #B4BCB6 20%, #d9ffe6 36%, #ffffff 48%, #d9ffe6 60%, #B4BCB6 76%, #B4BCB6 100%);
  background-size: 240% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  /* Статичный перелив (без анимации): перелив внутри backdrop-filter навигации
     заставлял пересчитывать размытие бара каждый кадр. Берём покойную фазу. */
  background-position: -30% 0;
  white-space: nowrap;
}
.site-nav-sub {
  font-family: var(--pl-font-mono);
  font-size: 9.5px;
  color: var(--pl-text-2);
  letter-spacing: .14em;
  text-transform: uppercase;
  margin-top: 2px;
}

/* ── Ссылки: текст + подчёркивание активного ──────────────── */
.site-nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.site-nav-links::-webkit-scrollbar { display: none; }
.site-nav-link {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 4px;
  margin: 0 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--pl-text-1);
  text-decoration: none;
  white-space: nowrap;
  transition: color .16s;
}
.site-nav-link svg { width: 15px; height: 15px; flex-shrink: 0; opacity: .85; }
.site-nav-link::after {
  content: "";
  position: absolute;
  left: 4px; right: 4px; bottom: -2px;
  height: 2px;
  border-radius: 2px;
  background: var(--pl-accent-bright);
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform .18s cubic-bezier(.22,1,.36,1);
}
.site-nav-link:hover { color: var(--pl-text-0); }
.site-nav-link:hover::after { transform: scaleX(.5); }
.site-nav-link.active { color: var(--pl-accent-bright); }
.site-nav-link.active svg { opacity: 1; }
.site-nav-link.active::after { transform: scaleX(1); }

/* ── Правая зона: помощь + аватар ─────────────────────────── */
.site-nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.site-nav-icon-btn {
  width: 34px; height: 34px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  color: var(--pl-text-1);
  text-decoration: none;
  transition: background .15s, color .15s;
}
.site-nav-icon-btn:hover {
  background: var(--pl-glass-2);
  color: var(--pl-text-0);
}
.site-nav-ava {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2a2f2c, #10130f);
  border: 1px solid var(--pl-line-2);
  display: grid;
  place-items: center;
  font-weight: 700;
  font-size: 13px;
  color: var(--pl-text-0);
  text-decoration: none;
  flex-shrink: 0;
}

@media (max-width: 720px) {
  .site-nav {
    gap: 10px;
    padding: 12px 16px;
    padding-top: calc(12px + env(safe-area-inset-top));
    padding-left: calc(16px + env(safe-area-inset-left));
    padding-right: calc(16px + env(safe-area-inset-right));
  }
  .site-nav-sub { display: none; }
  .site-nav-wordmark { font-size: 13px; }
  .nav-online-label { display: none; }
  .user-pill { max-width: 120px; padding: 7px 12px; }
  /* На телефоне бренд — только значок, чтобы правый блок и бургер помещались. */
  .site-nav-titles { display: none; }
  /* Выше специфичность (.site-nav …) — побеждает базовое .pl-popover, которое
     идёт ниже по файлу. Позиция fixed относительно навбара: у .site-nav есть
     backdrop-filter → он containing block, поэтому top:100% = сразу под баром. */
  .site-nav .pl-popover {
    position: fixed;
    top: calc(100% + 6px);
    left: 8px; right: 8px;
    width: auto;
    max-height: calc(100dvh - 100px - env(safe-area-inset-top));
    overflow-y: auto;
  }
}

/* ── Онлайн-индикатор + аватар-овал с попап-карточкой (nav-user-hub) ─── */
.nav-online-wrap { flex-shrink: 0; }
.nav-online {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  padding: 6px 11px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--pl-font-ui);
  cursor: pointer;
  color: var(--pl-accent-bright);
  border: 1px solid color-mix(in srgb, var(--pl-accent-bright) 28%, transparent);
  background: color-mix(in srgb, var(--pl-accent-bright) 9%, transparent);
  transition: background .15s, border-color .15s;
}
.nav-online:hover { background: color-mix(in srgb, var(--pl-accent-bright) 16%, transparent); border-color: color-mix(in srgb, var(--pl-accent-bright) 45%, transparent); }
.nav-online-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--pl-accent-bright);
  /* Статичная точка «онлайн»: смысл несёт сам зелёный кружок, бесконечный пульс
     в баре с backdrop-filter будил видеокарту каждый кадр — убрали. */
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--pl-accent-bright) 18%, transparent);
}
@media (max-width: 720px) {
  .nav-online-label { display: none; }
}

.user-pill-wrap { position: relative; flex-shrink: 0; }
.user-pill {
  display: inline-flex;
  align-items: center;
  max-width: 220px;
  padding: 7px 15px;
  border-radius: 999px;
  font-family: var(--pl-font-ui);
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
  white-space: nowrap;
  cursor: pointer;
  color: inherit;
  border: 1px solid color-mix(in srgb, currentColor 22%, transparent);
  background: color-mix(in srgb, currentColor 7%, transparent);
  transition: border-color .15s, background .15s, color .15s;
}
.user-pill:hover {
  color: var(--pl-accent-bright);
  border-color: color-mix(in srgb, var(--pl-accent-bright) 45%, transparent);
  background: color-mix(in srgb, var(--pl-accent-bright) 10%, transparent);
}

.pl-pop-wrap { position: relative; }
.pl-popover {
  position: absolute;
  top: calc(100% + 10px);
  right: 0;
  z-index: 80;
  width: 300px;
  border-radius: 16px;
  border: 1px solid var(--pl-line-2);
  background: var(--pl-bg-1, #0d1011);
  box-shadow: 0 24px 60px -16px rgba(0,0,0,.65);
  overflow: hidden;
}
.pl-popover[hidden] { display: none; }
.people-popover { width: 320px; }
.pl-pop-loading { padding: 22px; color: var(--pl-text-2); font-size: 13px; }

/* Список участников */
.ppl-head { padding: 15px 16px 11px; border-bottom: 1px solid var(--pl-line); }
.ppl-title { font-family: var(--pl-font-display); font-weight: 800; font-size: 15px; color: var(--pl-text-0); }
.ppl-sub { margin-top: 2px; font-size: 11.5px; color: var(--pl-text-2); }
.ppl-list { max-height: 340px; overflow-y: auto; padding: 6px; }
.ppl-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; }
.ppl-row.online { background: color-mix(in srgb, var(--pl-accent-bright) 7%, transparent); }
.ppl-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pl-line-2); flex-shrink: 0; }
.ppl-dot.on { background: var(--pl-accent-bright); box-shadow: 0 0 7px color-mix(in srgb, var(--pl-accent-bright) 60%, transparent); }
.ppl-main { flex: 1; min-width: 0; }
.ppl-name { font-size: 13px; font-weight: 600; color: var(--pl-text-0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ppl-role { display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 999px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; vertical-align: middle; background: color-mix(in srgb, var(--pl-text-2) 16%, transparent); color: var(--pl-text-2); }
.ppl-role.role-admin { background: color-mix(in srgb, #f59e0b 24%, transparent); color: #fcd34d; }
.ppl-role.role-supervisor { background: color-mix(in srgb, var(--pl-accent-bright) 20%, transparent); color: var(--pl-accent-bright); }
.ppl-role.role-editor { background: color-mix(in srgb, #60a5fa 20%, transparent); color: #93c5fd; }
.ppl-role.role-viewer { background: color-mix(in srgb, var(--pl-text-2) 14%, transparent); color: var(--pl-text-2); }
.ppl-meta { font-size: 11px; color: var(--pl-text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ppl-when { font-size: 11px; color: var(--pl-text-2); flex-shrink: 0; }
.ppl-empty { padding: 22px; text-align: center; color: var(--pl-text-2); font-size: 13px; }

.ucard { padding: 16px 16px 14px; color: var(--pl-text-0); font-family: var(--pl-font-ui); }
.ucard-head { padding-bottom: 12px; border-bottom: 1px solid var(--pl-line); }
.ucard-name { font-family: var(--pl-font-display); font-weight: 800; font-size: 16px; letter-spacing: -.01em; }
.ucard-sub { margin-top: 3px; font-size: 12px; color: var(--pl-text-2); }
.ucard-teams { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
.ucard-team { font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 999px; color: var(--pl-text-1); background: var(--pl-glass-2); border: 1px solid var(--pl-line-2); }

.ucard-section { margin-top: 13px; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--pl-text-2); }
.ucard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 8px 0 4px; }
.ucard-stat { text-align: center; padding: 8px 4px; border-radius: 12px; background: var(--pl-glass); }
.ucard-stat-num { font-family: var(--pl-font-display); font-weight: 800; font-size: 20px; color: var(--pl-accent-bright); }
.ucard-stat-label { margin-top: 2px; font-size: 10.5px; color: var(--pl-text-2); }

.ucard-rows { display: flex; flex-direction: column; gap: 7px; padding: 6px 0 12px; }
.ucard-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 12.5px; color: var(--pl-text-2); }
.ucard-row b { color: var(--pl-text-0); font-weight: 700; }

.ucard-relationship {
  padding: 11px 12px;
  border-radius: 12px;
  background: color-mix(in srgb, var(--pl-accent) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--pl-accent) 24%, transparent);
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--pl-text-1);
}
.ucard-logout {
  display: block;
  margin-top: 12px;
  text-align: center;
  padding: 9px;
  border-radius: 11px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--pl-text-1);
  text-decoration: none;
  border: 1px solid var(--pl-line-2);
  transition: background .15s, color .15s;
}
.ucard-logout:hover { background: var(--pl-glass-2); color: var(--pl-text-0); }

/* ── iOS-зум при фокусе на поле: лечится размером ≥16px ─────────────────
   Глобально для всех полей ввода на узких экранах. !important — потому что
   многие поля заданы меньшим размером (классами ui-input/inline 13–15px),
   а предотвращение зума важнее их компактности на телефоне. */
@media (max-width: 768px) {
  input:not([type="checkbox"]):not([type="radio"]):not([type="range"]):not([type="file"]):not([type="color"]),
  textarea,
  select {
    font-size: 16px !important;
  }
}

/* ── Pull-to-refresh: кольцо со стрелкой НАД шапкой (iOS standalone-PWA) ──
   Кольцо живёт внутри body и его базовая позиция — выше верха экрана.
   При «резинке» body уезжает вниз, и кольцо проявляется в зазоре над шапкой. */
.pl-ptr{
  position:fixed;
  top:calc(-44px + env(safe-area-inset-top,0px));
  left:50%;
  transform:translateX(-50%);
  z-index:1200;
  opacity:0;
  pointer-events:none;
}
.pl-ptr-anim{transition:opacity .2s ease}
.pl-ptr-ring{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(9,12,11,.82);
  box-shadow:0 6px 20px -8px rgba(0,0,0,.7);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
}
.pl-ptr svg{display:block}
.pl-ptr-rot{transform:rotate(-90deg);transform-origin:14px 14px;transform-box:view-box}
.pl-ptr-track{fill:none;stroke:rgba(255,255,255,.14);stroke-width:2.4}
.pl-ptr-bar{
  fill:none;stroke:#39e07c;stroke-width:2.6;stroke-linecap:round;
  transition:stroke-dashoffset .06s linear;
}
.pl-ptr-arrow{
  fill:none;stroke:#39e07c;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  transition:opacity .15s ease;
}
.pl-ptr-ready .pl-ptr-arrow{opacity:0}
.pl-ptr-ready .pl-ptr-bar{stroke:#5dff9c;filter:drop-shadow(0 0 5px rgba(57,224,124,.7))}
.pl-ptr-ready .pl-ptr-ring{box-shadow:0 0 0 1px rgba(93,255,156,.4),0 6px 20px -8px rgba(0,0,0,.7)}
.pl-ptr-spin svg{animation:pl-ptr-rot .7s linear infinite;transform-origin:14px 14px;transform-box:view-box}
@keyframes pl-ptr-rot{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){
  .pl-ptr-spin svg{animation-duration:1.1s}
}

/* Тёмная подложка под body: при «резинке» pull-to-refresh верх не светится белым */
html{background:#07090A}

/* Скролл-бар на мобиле выглядит чужеродно — прячем (прокрутка остаётся,
   на тач-устройствах полоса оверлейная и не нужна постоянно). */
@media (max-width: 860px){
  html,body{scrollbar-width:none;-ms-overflow-style:none}
  html::-webkit-scrollbar,body::-webkit-scrollbar{width:0;height:0;background:transparent}
}

/* reduce-motion: гасим декоративные перелив/пульс навигации (статик = ноль нагрева) */
@media (prefers-reduced-motion: reduce){
  .site-nav-wordmark{animation:none !important;background-position:0 0}

}

const KEYNAME = "pl_portal_pw_v2";
let KEY = null, DATA = null;
function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
function esc(s){const d=document.createElement('div');d.textContent=(s==null?'':String(s));return d.innerHTML;}
async function deriveKey(pw){
  const base=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(SALT),iterations:ITERS,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
}
async function dec(blob){
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(blob.iv)},KEY,b64d(blob.ct));
  return new TextDecoder().decode(pt);
}
function show(view){
  for(const v of ["analyses","monitor","report"]) document.getElementById("view-"+v).hidden = (v!==view);
  document.getElementById("tab-analyses").classList.toggle("active",view==="analyses");
  document.getElementById("tab-monitor").classList.toggle("active",view==="monitor");
  if(view!=="report") window.scrollTo(0,0);
}
function analysesHTML(reports){
  let cards="";
  for(const r of reports){
    const sub=esc(r.product)+(r.scope?(" · "+esc(r.scope)):"");
    let stats="";
    if(r.insights) stats+=`<span class="subs-stat">${r.insights} находок</span>`;
    if(r.competitors) stats+=`<span class="subs-stat">${r.competitors} конкурентов</span>`;
    cards+=`<div class="subs-card-row"><a class="subs-card" href="#" onclick="openReport('${esc(r.id)}');return false">
      <div class="subs-card-body">
        <div class="subs-card-meta"><span class="subs-type-badge">Анализ</span><span class="ui-badge ready">готово</span></div>
        <div class="subs-card-title">${esc(r.product)}</div>
        <div class="subs-card-sub">${sub}</div>
        ${r.tldr?`<div class="subs-card-tldr">${esc(r.tldr)}</div>`:""}
        <div class="subs-card-stats">${stats}</div>
      </div><span class="subs-card-arrow">→</span></a></div>`;
  }
  return `<section class="ui-hero"><div class="ui-eyebrow">Реестр аналитик</div>
    <h1 class="ui-h1">Все <span>разборы</span></h1>
    <p class="ui-hero-sub">Готовые продуктовые разборы. Доступ только на чтение.</p></section>
    <div class="subs-feed"><div class="subs-feed-bar">${reports.length} разбор(ов)</div>${cards}</div>`;
}
function monitorHTML(d){
  const reports=d.reports, products=[...new Set(reports.map(r=>r.product))];
  const sum=k=>reports.reduce((a,r)=>a+(r[k]||0),0);
  const tile=(l,v,h)=>`<div class="ui-card p-4"><div class="text-[10px] font-bold uppercase tracking-wider text-ink-500">${esc(l)}</div>
    <div class="mt-2 text-3xl font-extrabold tracking-tightest">${esc(v)}</div>${h?`<div class="mt-1 text-xs text-ink-500">${esc(h)}</div>`:""}</div>`;
  const tiles=tile("Разборов",reports.length,"готовых")+tile("Продуктов",products.length,products.join(", ").slice(0,48))
    +tile("Находок",sum("insights"),"в инсайтах")+tile("Рекомендаций",sum("recommendations"),"к внедрению")+tile("Конкурентов",sum("competitors"),"в сравнении");
  let rows="";
  for(const r of reports) rows+=`<div class="flex items-center justify-between py-3" style="border-bottom:1px solid var(--pl-line,rgba(255,255,255,.08))">
    <div style="min-width:0"><div class="text-sm font-semibold">${esc(r.product)}</div><div class="text-xs text-ink-500">${esc(r.scope)}</div></div>
    <a class="ui-btn-ghost" href="#" onclick="openReport('${esc(r.id)}');return false">Открыть</a></div>`;
  return `<section class="ui-hero"><div class="ui-eyebrow">Обзор</div><h1 class="ui-h1">Монитор · <span>статистика</span></h1>
    <p class="ui-hero-sub">Сводка по готовым разборам. Доступ только на чтение.</p></section>
    <div class="grid grid-cols-2 gap-3 xl:grid-cols-5">${tiles}</div>
    <div class="ui-card p-5" style="margin-top:16px"><div class="text-[10px] font-bold uppercase tracking-wider text-ink-500" style="margin-bottom:6px">Разборы</div>${rows}</div>`;
}
async function openReport(id){
  const frame=document.getElementById("rframe");
  frame.srcdoc='<!doctype html><body style="font:15px system-ui;padding:24px;color:#666">Загрузка…</body>';
  show("report");
  try{
    const blob=REPORTS_ENC[id]||await (await fetch("r-"+id+".json")).json();
    frame.srcdoc=await dec(blob);
  }catch(e){ frame.srcdoc='<!doctype html><body style="font:15px system-ui;padding:24px;color:#b91c1c">Не удалось открыть отчёт</body>'; }
}
function closeReport(){ show("analyses"); }
async function unlock(pw, fromCache){
  try{
    KEY=await deriveKey(pw);
    DATA=JSON.parse(await dec(META));
    document.getElementById("view-analyses").innerHTML=analysesHTML(DATA.reports);
    document.getElementById("view-monitor").innerHTML=monitorHTML(DATA);
    document.getElementById("gate").hidden=true;
    document.getElementById("app").hidden=false;
    try{ sessionStorage.setItem(KEYNAME,pw); }catch(_){}
    show("analyses");
    return true;
  }catch(e){
    KEY=null;
    if(!fromCache) document.getElementById("gateErr").textContent="Неверный пароль";
    if(fromCache){ try{ sessionStorage.removeItem(KEYNAME); }catch(_){} }
    return false;
  }
}
document.getElementById("gateForm").addEventListener("submit",e=>{e.preventDefault();document.getElementById("gateErr").textContent="";unlock(document.getElementById("pw").value,false);});
(function(){ try{ const c=sessionStorage.getItem(KEYNAME); if(c) unlock(c,true); }catch(_){} })();
</script>
